<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rique Santos - Blog Pessoal</title>
    <meta name="description" content="Blog pessoal de Rique Santos - Desenvolvimento, tecnologia e experiências." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            text: '#e2e8f0',
                            muted: '#94a3b8',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="dark bg-dark-bg text-dark-text min-h-screen">

    <!-- Header -->
    <header class="border-b border-slate-800 sticky top-0 bg-dark-bg/90 backdrop-blur-sm z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="#" onclick="showHome()" class="text-xl font-bold text-white hover:text-primary transition-colors">
                rique<span class="text-primary">santos</span>.dev
            </a>
            <nav class="flex items-center gap-6">
                <a href="#" onclick="showHome()"
                    class="text-dark-muted hover:text-white transition-colors text-sm">Blog</a>
                <a href="#" onclick="showPage('solutions')"
                    class="text-dark-muted hover:text-white transition-colors text-sm">Soluções</a>
                <a href="#" onclick="showPage('about')"
                    class="text-dark-muted hover:text-white transition-colors text-sm">Sobre</a>
                <a href="https://github.com/riquesantos" target="_blank" rel="noopener noreferrer"
                    class="text-dark-muted hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app" class="max-w-4xl mx-auto px-4 py-10">
        <!-- Content is rendered by JavaScript -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 mt-20">
        <div class="max-w-4xl mx-auto px-4 py-8 text-center text-dark-muted text-sm">
            <p>&copy; <span id="year"></span> Rique Santos. Feito com ❤️ e código.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
